<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>十三张 · 联机对战</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(circle at 50% 20%,#1f7a4d,#0c3d27 70%);color:#fff;
    min-height:100vh;overflow-x:hidden;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:10px 14px;background:rgba(0,0,0,.35);position:sticky;top:0;z-index:20;backdrop-filter:blur(4px);flex-wrap:wrap;}
  .coins{display:flex;align-items:center;gap:6px;font-weight:700;font-size:18px;}
  .coins .yuan{font-size:12px;color:#ffe08a;font-weight:500;}
  .gold{color:#ffd54a;}
  .btn{background:linear-gradient(#ffd24a,#f0a500);color:#5a3b00;border:none;
    padding:8px 14px;border-radius:20px;font-weight:700;font-size:14px;cursor:pointer;
    box-shadow:0 2px 0 #b67d00;}
  .btn:active{transform:translateY(1px);box-shadow:0 1px 0 #b67d00;}
  .btn.sec{background:linear-gradient(#5fd0ff,#2b9fe0);color:#063b54;box-shadow:0 2px 0 #1c6f9e;}
  .btn.gray{background:linear-gradient(#dfe6ea,#aab6bd);color:#2a363c;box-shadow:0 2px 0 #7c8990;}
  .btn:disabled{filter:grayscale(.7);opacity:.6;cursor:default;}
  .btn.big{font-size:17px;padding:12px 28px;}
  .top-actions{display:flex;gap:8px;}
  .table{padding:8px 10px 150px;}
  .opponents{display:flex;justify-content:space-around;gap:6px;margin:6px 0 10px;}
  .opp{flex:1;background:rgba(0,0,0,.25);border-radius:12px;padding:8px 6px;text-align:center;min-width:0;}
  .opp h4{margin:0 0 6px;font-size:13px;color:#cdeede;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .opp .mini{display:flex;flex-direction:column;gap:3px;align-items:center;font-size:11px;color:#9fc;}
  .opp .row{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;}
  .opp .stat{font-size:11px;color:#ffd54a;margin-top:4px;min-height:14px;}
  .road{margin:8px 5;background:rgba(0,0,0,.22);border-radius:12px;padding:8px;}
  .road.active{outline:2px solid #ffd54a;}
  .road-head{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:6px;}
  .road-head .tag{color:#bfe;}
  .road-head .ev{color:#ffd54a;font-size:12px;}
  .slot{display:flex;flex-wrap:wrap;gap:5px;min-height:98px;}
  .timerbar{font-size:17px;font-weight:800;color:#ffd54a;text-align:center;min-height:22px;}
  .timerbar.warn{color:#ff8a8a;animation:blink .5s infinite alternate;}
  @keyframes blink{from{opacity:1}to{opacity:.45}}
  .hand{position:fixed;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);
    padding:8px 8px 12px;backdrop-filter:blur(6px);z-index:15;}
  .hand .slot{justify-content:center;}
  .controls{display:flex;gap:8px;justify-content:center;margin-bottom:8px;flex-wrap:wrap;}
  .card{width:68px;height:96px;border-radius:10px;background:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    font-weight:900;cursor:pointer;user-select:none;box-shadow:0 1px 3px rgba(0,0,0,.4);
    transition:transform .08s;}
  .card:active{transform:scale(.94);}
  .card.s0,.card.s3{color:#111;}
  .card.s1,.card.s2{color:#d4232a;}
  .card .rk{font-size:30px;line-height:1;}
  .card .st{font-size:23px;line-height:1;}
  .card.back{background:repeating-linear-gradient(45deg,#1d5fa8,#1d5fa8 6px,#1a539a 6px,#1a539a 12px);
    border:2px solid #fff;}
  .card.mini-c{width:42px;height:60px;border-radius:6px;gap:2px;}
  .card.mini-c .rk{font-size:19px;}
  .card.mini-c .st{font-size:14px;}
  .deal-anim{animation:dealIn .32s cubic-bezier(.2,.7,.3,1);}
  @keyframes dealIn{from{transform:translateY(-150px) rotate(-160deg) scale(.4);opacity:0}to{transform:none;opacity:1}}
  .reveal-anim{animation:pop .3s ease;}
  @keyframes pop{from{transform:scale(.2) rotateY(90deg);opacity:0}to{transform:scale(1);opacity:1}}
  .opp .mark{font-size:12px;font-weight:800;align-self:center;margin-left:5px;white-space:nowrap;}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:none;
    align-items:center;justify-content:center;padding:16px;}
  .overlay.show{display:flex;}
  .modal{background:#103d29;border:1px solid #2e7a52;border-radius:16px;max-width:540px;width:100%;
    max-height:88vh;overflow-y:auto;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.5);}
  .modal h2{margin:0 0 12px;font-size:20px;}
  .res-block{background:rgba(0,0,0,.25);border-radius:10px;padding:8px 10px;margin:8px 0;font-size:13px;}
  .res-block .line{display:flex;justify-content:space-between;padding:2px 0;}
  .pos{color:#7CFC9A;}.neg{color:#ff8a8a;}
  .total{font-size:22px;font-weight:800;text-align:center;margin:10px 0;}
  .amount-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:10px 0;}
  .amount-grid .opt{background:rgba(255,255,255,.08);border:1px solid #2e7a52;border-radius:10px;
    padding:12px 6px;text-align:center;cursor:pointer;}
  .amount-grid .opt .y{font-size:18px;font-weight:800;color:#ffd54a;}
  .amount-grid .opt .c{font-size:12px;color:#bfe;}
  .hint{font-size:12px;color:#9fc;line-height:1.7;}
  .close-x{float:right;cursor:pointer;font-size:20px;color:#bfe;}
  .badge{display:inline-block;background:#c0392b;color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px;}
  .badge.gold{background:#f0a500;color:#3a2600;}
  .status{font-size:12px;color:#ffd54a;min-height:16px;text-align:center;}
  input.txt{width:100%;padding:12px;border-radius:10px;border:1px solid #2e7a52;background:#0b2a1c;
    color:#fff;font-size:18px;text-align:center;letter-spacing:2px;outline:none;margin:8px 0;}
  .lobbybox{background:rgba(0,0,0,.3);border-radius:14px;padding:16px;margin:10px 0;text-align:center;}
  .roomcode{font-size:16px;margin-bottom:8px;}
  .roomcode b{font-size:34px;color:#ffd54a;letter-spacing:6px;margin:0 8px;}
  .seatlist{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0;}
  .seatchip{background:rgba(255,255,255,.1);border-radius:18px;padding:7px 14px;font-size:14px;}
  .seatchip.empty{color:#7a9;border:1px dashed #4a7;}
  .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;
    padding:10px 18px;border-radius:10px;font-size:14px;z-index:99;display:none;}
  .conn{font-size:11px;color:#9fc;}
</style>
</head>
<body>
<div class="topbar">
  <div class="coins">💰 <span class="gold" id="balance">--</span><span class="yuan" id="yuanEq"></span></div>
  <div style="display:flex;align-items:center;gap:8px;flex:1;justify-content:center;min-width:0;">
    <div class="conn" id="connState">连接中…</div>
    <span id="roomTag" onclick="shareRoom()" style="display:none;font-size:12px;color:#ffd54a;font-weight:800;
      background:rgba(255,212,74,.18);border:1px solid rgba(255,212,74,.4);
      border-radius:12px;padding:3px 10px;cursor:pointer;letter-spacing:2px;white-space:nowrap">
      🏠 房号 <span id="roomTagCode">----</span>
    </span>
  </div>
  <div class="top-actions">
    <button class="btn gray" id="soundBtn" onclick="toggleSound()">🔊</button>
    <button class="btn sec" onclick="openRecharge()">充值</button>
    <button class="btn gray" id="exitBtn" onclick="exitRoom()" style="display:none">退出房间</button>
  </div>
</div>

<div class="table">
  <div class="lobbybox" id="lobbyBox" style="display:none">
    <div class="roomcode">房号<b id="lbCode">----</b><button class="btn sec" onclick="shareRoom()">📤 分享</button></div>

    <p class="hint">点击上方「📤 分享」按钮,朋友收到链接直接点击即可自动加入！<br>人不满4人时开局自动用电脑AI补位。</p>
    <div id="lbAction"></div>
  </div>

  <div class="opponents" id="opponents"></div>
  <div class="timerbar" id="timerBar"></div>

  <div class="road" id="road0" onclick="selectRoad(0)">
    <div class="road-head"><span class="tag">头道 (3张)</span><span class="ev" id="ev0"></span></div>
    <div class="slot" id="slot0"></div>
  </div>
  <div class="road" id="road1" onclick="selectRoad(1)">
    <div class="road-head"><span class="tag">中道 (5张)</span><span class="ev" id="ev1"></span></div>
    <div class="slot" id="slot1"></div>
  </div>
  <div class="road active" id="road2" onclick="selectRoad(2)">
    <div class="road-head"><span class="tag">尾道 (5张)</span><span class="ev" id="ev2"></span></div>
    <div class="slot" id="slot2"></div>
  </div>
  <div class="status" id="validMsg"></div>
</div>

<div class="hand">
  <div class="controls">
    <button class="btn sec" id="autoBtn" onclick="autoArrange()" disabled>一键理牌</button>
    <button class="btn gray" id="clearBtn" onclick="clearArrange()" disabled>收回</button>
    <button class="btn" id="submitBtn" onclick="submitArrange()" disabled>提交比牌</button>
  </div>
  <div class="slot" id="handSlot"></div>
</div>

<!-- 昵称 -->
<div class="overlay" id="nameOverlay"><div class="modal">
  <h2>欢迎来玩十三张</h2>
  <p class="hint">起一个牌桌上显示的昵称:</p>
  <input class="txt" id="nameInput" maxlength="12" placeholder="你的昵称">
  <div style="text-align:center;margin-top:8px"><button class="btn big" onclick="saveName()">进入大厅</button></div>
</div></div>

<!-- 大厅 -->
<div class="overlay" id="lobbyOverlay"><div class="modal">
  <h2>游戏大厅</h2>
  <p class="hint">你好,<b id="helloName"></b>!创建房间后把房号发给朋友,或输入朋友给你的房号加入。</p>
  <div style="text-align:center;margin:16px 0">
    <button class="btn big" onclick="sendMsg({t:'create'})">创建房间</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <input class="txt" id="joinCode" maxlength="4" placeholder="输入4位房号" inputmode="numeric" style="margin:0">
    <button class="btn sec big" onclick="joinRoom()">加入</button>
  </div>
  <p class="hint" style="margin-top:14px">金币为游戏虚拟币,仅供娱乐,不涉及真实货币。</p>
</div></div>

<!-- 结算 -->
<div class="overlay" id="resOverlay"><div class="modal" id="resModal"></div></div>
<!-- 充值 -->
<div class="overlay" id="rechargeOverlay"><div class="modal">
  <span class="close-x" onclick="closeOverlay('rechargeOverlay')">✕</span>
  <h2>充值金币</h2>
  <p class="hint">兑换比例:<b>1 元 = 300 金币</b>(演示模式,不涉及真实支付)</p>
  <div class="amount-grid" id="amtGrid"></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ====================== 工具与牌型 ====================== */
const SUITS=['♠','♥','♦','♣'];
function rankLabel(r){return r===14?'A':r===13?'K':r===12?'Q':r===11?'J':r===10?'10':''+r;}
const CAT5=['乌龙','一对','两对','三条','顺子','同花','葫芦','铁支','同花顺'];
const CAT3=['乌龙','一对','三条'];
function evaluate5(cs){
  const rs=cs.map(c=>c.r).sort((a,b)=>b-a);
  const counts={};rs.forEach(r=>counts[r]=(counts[r]||0)+1);
  const groups=Object.entries(counts).map(([r,c])=>[c,+r]).sort((a,b)=>b[0]-a[0]||b[1]-a[1]);
  const isFlush=cs.every(c=>c.s===cs[0].s);
  const uniq=[...new Set(rs)];
  let isStraight=false,sHigh=0;
  if(uniq.length===5){
    if(uniq[0]-uniq[4]===4){isStraight=true;sHigh=uniq[0];}
    else if(uniq[0]===14&&uniq[1]===5&&uniq[4]===2){isStraight=true;sHigh=5;}
  }
  let cat,tb;
  if(isStraight&&isFlush){cat=8;tb=[sHigh];}
  else if(groups[0][0]===4){cat=7;tb=[groups[0][1],groups[1][1]];}
  else if(groups[0][0]===3&&groups[1][0]>=2){cat=6;tb=[groups[0][1],groups[1][1]];}
  else if(isFlush){cat=5;tb=rs.slice();}
  else if(isStraight){cat=4;tb=[sHigh];}
  else if(groups[0][0]===3){cat=3;tb=[groups[0][1],...rs.filter(r=>r!==groups[0][1])];}
  else if(groups[0][0]===2&&groups[1][0]===2){const p=[groups[0][1],groups[1][1]].sort((a,b)=>b-a);
    cat=2;tb=[...p,rs.find(r=>r!==p[0]&&r!==p[1])];}
  else if(groups[0][0]===2){cat=1;tb=[groups[0][1],...rs.filter(r=>r!==groups[0][1])];}
  else{cat=0;tb=rs.slice();}
  return {cat,compCat:cat,tb,name:CAT5[cat]};
}
function evaluate3(cs){
  const rs=cs.map(c=>c.r).sort((a,b)=>b-a);
  const counts={};rs.forEach(r=>counts[r]=(counts[r]||0)+1);
  const groups=Object.entries(counts).map(([r,c])=>[c,+r]).sort((a,b)=>b[0]-a[0]||b[1]-a[1]);
  let cat,tb;
  if(groups[0][0]===3){cat=2;tb=[groups[0][1]];}
  else if(groups[0][0]===2){cat=1;tb=[groups[0][1],...rs.filter(r=>r!==groups[0][1])];}
  else{cat=0;tb=rs.slice();}
  return {cat,compCat:cat===2?3:cat,tb,name:CAT3[cat]};
}
function cmpKey(a,b){
  if(a.compCat!==b.compCat)return a.compCat-b.compCat;
  const n=Math.max(a.tb.length,b.tb.length);
  for(let i=0;i<n;i++){const x=a.tb[i]||0,y=b.tb[i]||0;if(x!==y)return x-y;}
  return 0;
}
function strengthVal(e){let v=e.compCat*1e10;for(let i=0;i<5;i++)v+=(e.tb[i]||0)*Math.pow(15,4-i);return v;}
function combinations(arr,k){
  const res=[],n=arr.length,idx=[];
  (function rec(start,depth){
    if(depth===k){res.push(idx.map(i=>arr[i]));return;}
    for(let i=start;i<n;i++){idx[depth]=i;rec(i+1,depth+1);}
  })(0,0);
  return res;
}
function bestArrange(cards){
  let best=null,bestVal=-Infinity;
  for(const back of combinations(cards,5)){
    const be=evaluate5(back);
    const rem=cards.filter(c=>!back.includes(c));
    for(const mid of combinations(rem,5)){
      const me=evaluate5(mid);
      if(cmpKey(be,me)<0)continue;
      const front=rem.filter(c=>!mid.includes(c));
      const fe=evaluate3(front);
      if(cmpKey(me,fe)<0)continue;
      const val=strengthVal(be)*100+strengthVal(me)*10+strengthVal(fe);
      if(val>bestVal){bestVal=val;best={front,mid,back};}
    }
  }
  return best;
}
function loadStore(k,d){try{return JSON.parse(localStorage.getItem(k))??d;}catch(e){return d;}}
function saveStore(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

/* ====================== 随机昵称 ====================== */
const _ADJ=['快乐','无敌','暴风','疯狂','神秘','冷酷','霸气','萌萌','闪电','花样',
            '嚣张','悠哉','呆萌','威猛','傲娇','佛系','猛烈','飘逸','狂野','幸运'];
const _NOU=['西瓜','土豆','鲤鱼','大侠','老虎','猎豹','达人','高手','牌神','豆豆',
            '麻将','扑克','棋圣','赌神','壕哥','妹子','老王','小明','吃瓜','咸鱼'];
function randomNickname(){
  return _ADJ[Math.random()*_ADJ.length|0]+_NOU[Math.random()*_NOU.length|0];
}

/* ====================== URL 房号参数 ====================== */
const _urlRoom=(()=>{const p=new URLSearchParams(location.search);const r=p.get('room');return r&&/^\d{4}$/.test(r)?r:null;})();

/* ====================== 音效 ====================== */
let actx=null,soundOn=loadStore('ol_sound',true),sgMTimer=null,bgmStep=0;
function ac(){if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended')actx.resume();return actx;}
function tone(f,t0,dur,type,vol){
  if(!soundOn)return;
  try{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.type=type||'sine';o.frequency.value=f;
    const t=a.currentTime+t0;
    g.gain.setValueAtTime(vol||0.15,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+0.05);
  }catch(e){}
}
function sfxDraw(vol){
  if(!soundOn)return;
  try{
    const a=ac(),t=a.currentTime;
    const len=Math.floor(a.sampleRate*0.07),buf=a.createBuffer(1,len,a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++){const x=i/len;d[i]=(Math.random()*2-1)*(0.25+0.75*x*x);}
    const s=a.createBufferSource();s.buffer=buf;
    const f=a.createBiquadFilter();f.type='highpass';
    f.frequency.setValueAtTime(1000,t);f.frequency.exponentialRampToValueAtTime(4500,t+0.07);
    const g=a.createGain();g.gain.setValueAtTime(vol*0.4,t);
    g.gain.linearRampToValueAtTime(vol*0.9,t+0.06);g.gain.setValueAtTime(0.0001,t+0.075);
    s.connect(f);f.connect(g);g.connect(a.destination);s.start(t);
    const l2=Math.floor(a.sampleRate*0.018),b2=a.createBuffer(1,l2,a.sampleRate);
    const d2=b2.getChannelData(0);
    for(let i=0;i<l2;i++)d2[i]=(Math.random()*2-1)*Math.pow(1-i/l2,2);
    const s2=a.createBufferSource();s2.buffer=b2;
    const f2=a.createBiquadFilter();f2.type='highpass';f2.frequency.value=2800;
    const g2=a.createGain();g2.gain.value=vol*1.3;
    s2.connect(f2);f2.connect(g2);g2.connect(a.destination);s2.start(t+0.065);
    const o=a.createOscillator(),g3=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(170,t+0.065);
    o.frequency.exponentialRampToValueAtTime(65,t+0.125);
    g3.gain.setValueAtTime(vol*0.55,t+0.065);
    g3.gain.exponentialRampToValueAtTime(0.0001,t+0.135);
    o.connect(g3);g3.connect(a.destination);o.start(t+0.065);o.stop(t+0.16);
  }catch(e){}
}
const sfxPlace=()=>sfxDraw(0.55), sfxBack=()=>sfxDraw(0.38), sfxFlip=()=>sfxDraw(0.45);
const sfxClick=()=>tone(1100,0,0.06,"triangle",0.14);
const sfxShuffle=()=>{for(let i=0;i<16;i++)setTimeout(()=>sfxDraw(0.1),i*30);};
const sfxTada=()=>[523,659,784,1047].forEach((f,j)=>tone(f,j*0.07,0.18,'triangle',0.16));
const sfxCoin=()=>{tone(1568,0,0.09,'square',0.1);tone(2093,0.08,0.16,'square',0.1);};
const sfxWin=()=>[523,659,784,1047].forEach((f,i)=>tone(f,i*0.13,0.3,'triangle',0.18));
const sfxLose=()=>[392,330,262].forEach((f,i)=>tone(f,i*0.16,0.32,'sawtooth',0.09));
function sfxGun(){
  if(!soundOn)return;
  try{
    const a=ac(),len=a.sampleRate*0.3,buf=a.createBuffer(1,len,a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3);
    const s=a.createBufferSource();s.buffer=buf;
    const g=a.createGain();g.gain.value=0.55;
    s.connect(g);g.connect(a.destination);s.start();
    tone(90,0,0.25,'sine',0.4);
  }catch(e){}
}
function speak(txt){
  if(!soundOn)return;
  try{const u=new SpeechSynthesisUtterance(txt);u.lang='zh-CN';u.rate=1.05;speechSynthesis.speak(u);}catch(e){}
}
const BGM_NOTES=[262,330,392,440,523,440,392,330,294,392,440,523,587,523,440,392];
function startBgm(){
  if(!soundOn||bgmTimer)return;
  bgmTimer=setInterval(()=>{
    const f=BGM_NOTES[bgmStep%BGM_NOTES.length];
    tone(f,0,0.34,'triangle',0.045);
    if(bgmStep%4===0)tone(f/2,0,0.6,'sine',0.05);
    bgmStep++;
  },300);
}
function stopBgm(){if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null;}}
function toggleSound(){
  soundOn=!soundOn;saveStore('ol_sound',soundOn);
  document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';
  if(soundOn){ac();startBgm();sfxClick();}else stopBgm();
}
document.addEventListener('pointerdown',function once(){
  document.removeEventListener('pointerdown',once);
  if(soundOn){ac();startBgm();}
});
/* ====================== 全局状态 ====================== */
const ROAD_CAP=[3,5,5],ROADNAME=['头道','中道','尾道'],COIN_PER_ROAD=10,COIN_PER_YUAN=300;
let G={
  uid:loadStore('ol_uid',null)||(function(){const u=(crypto.randomUUID?crypto.randomUUID():'u'+Date.now()+Math.random());saveStore('ol_uid',u);return u;})(),
  name:loadStore('ol_name',''),
  balance:null,phase:'out',          // out|lobby|dealing|arrange|submitted|reveal|result
  room:null,mySeat:-1,hand:[],roads:[[],[],[]],activeRoad:2,
  deadline:0,result:null,revealCount:0,blocks:null,roundToken:0
};
let ws=null,timerInt=null;

/* ====================== 网络 ====================== */
function sendMsg(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o));}
function connect(){
  const proto=location.protocol==='https:'?'wss://':'ws://';
  ws=new WebSocket(proto+location.host);
  ws.onopen=()=>{
    document.getElementById('connState').textContent='✅ 已连接';
    sendMsg({t:'hello',uid:G.uid,name:G.name});
  };
  ws.onclose=()=>{
    document.getElementById('connState').textContent='⚠ 连接断开,重连中…';
    setTimeout(connect,2000);
  };
  ws.onmessage=ev=>{
    let m;try{m=JSON.parse(ev.data);}catch(e){return;}
    onMsg(m);
  };
}
function onMsg(m){
  if(m.t==='welcome'){
    G.uid=m.uid;saveStore('ol_uid',m.uid);
    G.balance=m.balance;renderBalance();
    if(!G.name){
      const el=document.getElementById('nameInput');
      if(!el.value)el.value=randomNickname();
      show('nameOverlay');el.focus();el.select();
    }
    else{G.name=m.name;enterLobbyUI();}
    return;
  }
  if(m.t==='nameok'){G.name=m.name;saveStore('ol_name',m.name);hide('nameOverlay');enterLobbyUI();return;}
  if(m.t==='balance'){G.balance=m.balance;renderBalance();if(m.recharged){sfxCoin();toast('充值成功 +'+m.recharged+'金币','#2e7d32');}return;}
  if(m.t==='error'){toast(m.msg);return;}
  if(m.t==='left'){G.room=null;G.phase='out';enterLobbyUI();return;}
  if(m.t==='room'){
    G.room=m.room;
    const me=m.room.seats.findIndex(s=>s.uid===G.uid);
    if(me>=0)G.mySeat=me;
    const mySeatInfo=m.room.seats[G.mySeat];
    if(mySeatInfo&&mySeatInfo.balance!=null){G.balance=mySeatInfo.balance;renderBalance();}
    hide('lobbyOverlay');
    if(m.room.state==='lobby'){G.phase='lobby';renderLobby();}
    else renderRoomBar();
    return;
  }
  if(m.t==='deal'){
    G.mySeat=m.seat;G.deadline=m.deadline;
    startDealAnimation(m.hand);
    return;
  }
  if(m.t==='status'){
    if(G.phase==='submitted'||G.phase==='arrange')renderOppWaiting(m.submitted);
    return;
  }
  if(m.t==='result'){
    G.result=m;
    buildMyBlocks();
    startReveal();
    return;
  }
}

/* ====================== 界面基础 ====================== */
function show(id){document.getElementById(id).classList.add('show');}
function hide(id){document.getElementById(id).classList.remove('show');}
function closeOverlay(id){hide(id);}
let toastTimer=null;
function toast(msg,bg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=bg||'#c0392b';t.style.display='block';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.style.display='none',2600);
}
function renderBalance(){
  document.getElementById('balance').textContent=G.balance==null?'--':G.balance.toLocaleString();
  document.getElementById('yuanEq').textContent=G.balance==null?'':'≈ ¥'+(G.balance/COIN_PER_YUAN).toFixed(2);
}
function saveName(){
  const n=document.getElementById('nameInput').value.trim();
  if(!n){toast('昵称不能为空');return;}
  sendMsg({t:'setname',name:n});
}
function enterLobbyUI(){
  document.getElementById('helloName').textContent=G.name;
  document.getElementById('exitBtn').style.display='none';
  document.getElementById('lobbyBox').style.display='none';
  document.getElementById('opponents').innerHTML='';
  document.getElementById('timerBar').textContent='';
  document.getElementById('roomTag').style.display='none';
  clearTable();
  // 如果 URL 带了房号参数，自动填入
  if(_urlRoom){
    document.getElementById('joinCode').value=_urlRoom;
    // 稍等 0.8s 自动加入，让用户看到提示
    setTimeout(()=>{
      if(document.getElementById('lobbyOverlay').classList.contains('show')){
        toast('正在自动加入房间 '+_urlRoom+'…','#1565c0');
        setTimeout(()=>joinRoom(),600);
      }
    },800);
  }
  show('lobbyOverlay');
}
function joinRoom(){
  const code=document.getElementById('joinCode').value.trim();
  if(code.length!==4){toast('请输入4位房号');return;}
  sendMsg({t:'join',code});
}
function exitRoom(){if(confirm('退出当前房间?'))sendMsg({t:'leave'});}
function shareRoom(){
  if(!G.room)return;
  const url=location.origin+location.pathname+'?room='+G.room.code;
  const title='来玩十三张联机！';
  const text='我在玩十三张，房号：'+G.room.code+'，点击链接直接加入 👇';
  if(navigator.share){
    navigator.share({title,text,url}).catch(()=>{});
  }else{
    const full=text+'\n'+url;
    (navigator.clipboard?navigator.clipboard.writeText(full):Promise.reject())
      .then(()=>toast('邀请链接已复制，发给朋友吧！','#2e7d32'),
            ()=>prompt('复制后发给朋友：',full));
  }
}
// 保留旧名兼容
function copyCode(){shareRoom();}
function clearTable(){
  G.hand=[];G.roads=[[],[],[]];G.blocks=null;G.result=null;
  renderHand();renderRoads();
  ['autoBtn','clearBtn','submitBtn'].forEach(id=>document.getElementById(id).disabled=true);
}
function renderRoomBar(){
  document.getElementById('exitBtn').style.display='';
  if(G.room){
    document.getElementById('roomTagCode').textContent=G.room.code;
    document.getElementById('roomTag').style.display='';
  }
}
/* 大厅(房间内等待开局) */
function renderLobby(){
  stopTimer();clearTable();
  renderRoomBar();
  const box=document.getElementById('lobbyBox');
  box.style.display='';
  document.getElementById('opponents').innerHTML='';
  document.getElementById('timerBar').textContent='';
  document.getElementById('lbCode').textContent=G.room.code;
  const seats=document.getElementById('lbSeats');
  seats.innerHTML='';
  for(let i=0;i<4;i++){
    const s=G.room.seats[i];
    const chip=document.createElement('div');
    if(s){chip.className='seatchip';
      chip.textContent=s.name+(s.uid===G.uid?' (我)':'')+(s.ai?' 🤖':'')+(s.online?'':' ⚠掉线');}
    else{chip.className='seatchip empty';chip.textContent='空位·开局AI补位';}
    seats.appendChild(chip);
  }
  const act=document.getElementById('lbAction');
  if(G.room.hostUid===G.uid){
    act.innerHTML='<button class="btn big" onclick="sendMsg({t:\'start\'})">开始游戏</button>';
  }else{
    act.innerHTML='<span class="hint">等待房主开始游戏…</span>';
  }
}

/* ====================== 发牌动画 ====================== */
function othersList(){
  const o=[];
  if(!G.room)return o;
  for(let i=0;i<G.room.seats.length;i++)if(i!==G.mySeat)o.push({seat:i,info:G.room.seats[i]});
  return o;
}
function startDealAnimation(hand){
  hide('resOverlay');
  document.getElementById('lobbyBox').style.display='none';
  G.phase='dealing';G.blocks=null;G.result=null;G.revealCount=0;
  G.roads=[[],[],[]];G.activeRoad=2;G.hand=[];
  const token=++G.roundToken;
  renderHand();renderRoads();
  const others=othersList();
  const wrap=document.getElementById('opponents');wrap.innerHTML='';
  others.forEach((o,k)=>{
    const d=document.createElement('div');d.className='opp';
    d.innerHTML='<h4>'+o.info.name+(o.info.ai?' 🤖':'')+'</h4>';
    const mini=document.createElement('div');mini.className='mini';
    const row=document.createElement('div');row.className='row';row.id='dealRow'+k;
    mini.appendChild(row);d.appendChild(mini);wrap.appendChild(d);
  });
  document.getElementById('timerBar').textContent='🎴 发牌中…';
  sfxShuffle();
  const handSlot=document.getElementById('handSlot');
  let i=0;
  setTimeout(function step(){
    if(G.roundToken!==token)return;
    if(i>=52){
      G.hand=hand.slice().sort((a,b)=>b.r-a.r||a.s-b.s);
      G.phase='arrange';
      renderHand();renderRoads();renderOppWaiting([]);
      document.getElementById('autoBtn').disabled=false;
      document.getElementById('clearBtn').disabled=false;
      sfxTada();
      startTimer();
      return;
    }
    const seat=i%4,idx=i>>2;
    if(seat===0){
      const c=hand[idx];
      const el=cardEl(c);el.classList.add('deal-anim');
      handSlot.appendChild(el);
      sfxDraw(0.22);
    }else{
      const row=document.getElementById('dealRow'+(seat-1));
      if(row){const b=cardEl(null,{back:true,mini:true});b.classList.add('deal-anim');row.appendChild(b);}
    }
    i++;
    setTimeout(step,42);
  },550);
}
/* 等待界面:对手牌背+提交状态 */
function renderOppWaiting(submitted){
  const wrap=document.getElementById('opponents');wrap.innerHTML='';
  othersList().forEach(o=>{
    const d=document.createElement('div');d.className='opp';
    d.innerHTML='<h4>'+o.info.name+(o.info.ai?' 🤖':'')+'</h4>';
    const mini=document.createElement('div');mini.className='mini';
    const row=document.createElement('div');row.className='row';
    for(let j=0;j<13;j++)row.appendChild(cardEl(null,{back:true,mini:true}));
    mini.appendChild(row);d.appendChild(mini);
    const st=document.createElement('div');st.className='stat';
    st.textContent=(submitted||[]).includes(o.seat)?'✅ 已提交':'🤔 理牌中…';
    d.appendChild(st);
    wrap.appendChild(d);
  });
}

/* ====================== 计时 ====================== */
function startTimer(){
  stopTimer();
  updateTimer();
  timerInt=setInterval(updateTimer,250);
}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}
  const t=document.getElementById('timerBar');t.classList.remove('warn');}
function updateTimer(){
  const t=document.getElementById('timerBar');
  if(G.phase!=='arrange'&&G.phase!=='submitted'){t.textContent='';t.classList.remove('warn');return;}
  const left=Math.max(0,Math.ceil((G.deadline-Date.now())/1000));
  if(G.phase==='submitted'){t.textContent='✅ 已提交,等待其他玩家… ('+left+'s)';t.classList.remove('warn');}
  else{
    t.textContent='⏱ 摆牌倒计时 '+left+' 秒';
    t.classList.toggle('warn',left<=10);
    if(left<=0&&G.phase==='arrange'){autoArrange();submitArrange(true);}
  }
}

/* ====================== 摆牌交互 ====================== */
function cardEl(c,opts={}){
  const d=document.createElement('div');
  if(opts.back){d.className='card back'+(opts.mini?' mini-c':'');return d;}
  d.className='card s'+c.s+(opts.mini?' mini-c':'');
  d.innerHTML='<span class="rk">'+rankLabel(c.r)+'</span><span class="st">'+SUITS[c.s]+'</span>';
  return d;
}
function renderHand(){
  const h=document.getElementById('handSlot');h.innerHTML='';
  G.hand.forEach(c=>{
    const el=cardEl(c);
    el.onclick=e=>{e.stopPropagation();onHandCardClick(c);};
    h.appendChild(el);
  });
}
function renderRoads(){
  for(let i=0;i<3;i++){
    const s=document.getElementById('slot'+i);s.innerHTML='';
    G.roads[i].forEach(c=>{
      const el=cardEl(c);
      el.onclick=e=>{e.stopPropagation();returnCard(c,i);};
      s.appendChild(el);
    });
    document.getElementById('road'+i).classList.toggle('active',G.activeRoad===i&&G.phase==='arrange');
    const ev=document.getElementById('ev'+i);
    if(G.roads[i].length===ROAD_CAP[i]){
      const e=i===0?evaluate3(G.roads[i]):evaluate5(G.roads[i]);
      ev.textContent=e.name;
    }else ev.textContent='';
  }
  checkValid();
}
function onHandCardClick(c){
  if(G.phase!=='arrange')return;
  let r=G.activeRoad;
  if(G.roads[r].length>=ROAD_CAP[r]){
    const next=[2,1,0].find(i=>G.roads[i].length<ROAD_CAP[i]);
    if(next===undefined)return;
    G.activeRoad=next;r=next;
  }
  G.roads[r].push(c);
  G.hand=G.hand.filter(x=>x!==c);
  if(G.roads[r].length>=ROAD_CAP[r]){
    const next=[2,1,0].find(i=>G.roads[i].length<ROAD_CAP[i]);
    if(next!==undefined)G.activeRoad=next;
  }
  sfxPlace();
  if(G.roads[2].length===5&&G.roads[1].length===5&&G.hand.length>0
     &&G.roads[0].length+G.hand.length<=3){
    G.roads[0].push(...G.hand);G.hand=[];
  }
  renderHand();renderRoads();
}
function returnCard(c,roadIdx){
  if(G.phase!=='arrange')return;
  G.roads[roadIdx]=G.roads[roadIdx].filter(x=>x!==c);
  sfxBack();
  G.hand.push(c);
  G.hand.sort((a,b)=>b.r-a.r||a.s-b.s);
  renderHand();renderRoads();
}
function selectRoad(i){if(G.phase==='arrange'){G.activeRoad=i;renderRoads();}}
function clearArrange(){
  if(G.phase!=='arrange')return;
  for(let i=0;i<3;i++){G.hand.push(...G.roads[i]);G.roads[i]=[];}
  G.hand.sort((a,b)=>b.r-a.r||a.s-b.s);
  G.activeRoad=2;
  renderHand();renderRoads();
}
function autoArrange(){
  if(G.phase!=='arrange')return;
  const all=[...G.hand];for(let i=0;i<3;i++)all.push(...G.roads[i]);
  const best=bestArrange(all);
  if(best){G.roads=[best.front,best.mid,best.back];G.hand=[];}
  sfxClick();
  renderHand();renderRoads();
}
function checkValid(){
  const msg=document.getElementById('validMsg');
  const filled=G.roads.every((r,i)=>r.length===ROAD_CAP[i]);
  const btn=document.getElementById('submitBtn');
  if(G.phase!=='arrange'){msg.textContent='';btn.disabled=true;return;}
  if(!filled){msg.textContent='';btn.disabled=true;return;}
  const fe=evaluate3(G.roads[0]),me=evaluate5(G.roads[1]),be=evaluate5(G.roads[2]);
  const ok=cmpKey(be,me)>=0&&cmpKey(me,fe)>=0;
  msg.innerHTML=ok?'✅ 摆牌合法,可以提交'
    :'<span style="color:#ff8a8a;font-weight:700">⚠ 相公!尾道须≥中道≥头道,提交将按全输算</span>';
  btn.disabled=false;
}
function submitArrange(auto){
  if(G.phase!=='arrange')return;
  const filled=G.roads.every((r,i)=>r.length===ROAD_CAP[i]);
  if(!filled)return;
  sendMsg({t:'arrange',cards:{front:G.roads[0],mid:G.roads[1],back:G.roads[2]}});
  G.phase='submitted';
  ['autoBtn','clearBtn','submitBtn'].forEach(id=>document.getElementById(id).disabled=true);
  renderRoads();
  if(auto)toast('超时,已自动提交','#7a5c00');
}

/* ====================== 比牌过程与结算 ====================== */
function buildMyBlocks(){
  const res=G.result;
  G.blocks=othersList().map(o=>{
    const j=o.seat,i=G.mySeat;
    const pr=res.pairs.find(p=>(p.i===i&&p.j===j)||(p.i===j&&p.j===i));
    let detail,shoot,pts;
    if(pr.i===i){detail=pr.detail;shoot=pr.shoot;pts=pr.pts;}
    else{
      detail=pr.detail.map(d=>({i:d.i,res:-d.res,b:d.b}));
      shoot=-pr.shoot;pts=-pr.pts;
    }
    return {seat:j,player:res.players[j],detail,shoot,pts,coins:pts*COIN_PER_ROAD};
  });
}
function startReveal(){
  G.phase='reveal';stopTimer();
  const token=++G.roundToken;
  const tBar=document.getElementById('timerBar');
  renderOppReveal(0);
  [1,2,3].forEach(n=>{
    setTimeout(()=>{
      if(G.roundToken!==token)return;
      tBar.textContent='🃏 正在比 '+ROADNAME[n-1]+'…';
      sfxFlip();
      renderOppReveal(n,n-1);
      updateMyRoadMarks(n);
    },300+(n-1)*1400);
  });
  setTimeout(()=>{
    if(G.roundToken!==token)return;
    G.phase='result';
    tBar.textContent='';
    const meP=G.result.players[G.mySeat];
    G.balance=meP.balance;renderBalance();
    let gi=0;
    G.blocks.forEach(b=>{
      if(b.shoot===1){setTimeout(()=>{sfxGun();speak('砰!你打枪了'+b.player.name);},gi*1700);gi++;}
      else if(b.shoot===-1){setTimeout(()=>{sfxGun();speak('砰!你被'+b.player.name+'打枪了');},gi*1700);gi++;}
    });
    const total=meP.coins;
    setTimeout(()=>{
      if(total>0){sfxWin();sfxCoin();}
      else if(total<0){sfxLose();}
      else{tone(523,0,0.2,'triangle',0.15);tone(523,0.25,0.2,'triangle',0.15);}
    },gi*1700);
    showResult();
  },300+3*1400+600);
}
function renderOppReveal(revealCount,animIdx){
  const wrap=document.getElementById('opponents');wrap.innerHTML='';
  G.blocks.forEach(b=>{
    const p=b.player;
    const d=document.createElement('div');d.className='opp';
    let gun='';
    if(revealCount>=3){
      if(b.shoot===1)gun='<span class="badge gold">被你打枪</span>';
      else if(b.shoot===-1)gun='<span class="badge">打枪了你</span>';
    }
    d.innerHTML='<h4>'+p.name+(p.ai?' 🤖':'')+
      ((revealCount>0&&p.foul)?'<span class="badge">相公</span>':'')+gun+'</h4>';
    const mini=document.createElement('div');mini.className='mini';
    for(let i=0;i<3;i++){
      const row=document.createElement('div');row.className='row';
      if(i<revealCount){
        [p.front,p.mid,p.back][i].forEach(c=>{
          const el=cardEl(c,{mini:true});
          if(i===animIdx)el.classList.add('reveal-anim');
          row.appendChild(el);
        });
        const dd=b.detail[i];
        const coins=dd.res*dd.b*COIN_PER_ROAD;
        const mk=document.createElement('span');
        mk.className='mark '+(dd.res>0?'pos':dd.res<0?'neg':'');
        mk.textContent=dd.res>0?'你胜+'+coins:dd.res<0?'你负'+coins:'平';
        row.appendChild(mk);
      }else{
        const n=i===0?3:5;
        for(let j=0;j<n;j++)row.appendChild(cardEl(null,{back:true,mini:true}));
      }
      mini.appendChild(row);
    }
    d.appendChild(mini);wrap.appendChild(d);
  });
}
function updateMyRoadMarks(revealCount){
  if(!G.blocks)return;
  for(let i=0;i<revealCount;i++){
    let w=0,l=0,coins=0;
    G.blocks.forEach(b=>{const d=b.detail[i];
      if(d.res>0)w++;else if(d.res<0)l++;coins+=d.res*d.b*COIN_PER_ROAD;});
    const ev=document.getElementById('ev'+i);
    const base=ev.textContent.split(' · ')[0];
    ev.innerHTML=base+' · '+w+'胜'+l+'负 <span class="'+(coins>=0?'pos':'neg')+'">'+(coins>=0?'+':'')+coins+'</span>';
  }
}
function showResult(){
  const meP=G.result.players[G.mySeat];
  const total=meP.coins;
  let html='<h2>比牌结果'+(meP.foul?'<span class="badge">你相公了</span>':'')+
    (meP.auto?'<span class="badge gold">超时·系统代摆</span>':'')+'</h2>';
  G.blocks.forEach(b=>{
    html+='<div class="res-block"><div class="line"><b>vs '+b.player.name+(b.player.ai?' 🤖':'')+'</b>'+
      (b.shoot===1?'<span class="badge gold">打枪!翻倍</span>':b.shoot===-1?'<span class="badge">被打枪</span>':'')+
      '<span class="'+(b.coins>=0?'pos':'neg')+'">'+(b.coins>=0?'+':'')+b.coins+' 金币</span></div>';
    b.detail.forEach(d=>{
      const sym=d.res>0?'<span class="pos">胜</span>':d.res<0?'<span class="neg">负</span>':'平';
      html+='<div class="line"><span>'+ROADNAME[d.i]+' '+sym+'</span><span>'+(d.b?d.res*d.b+'水':'')+'</span></div>';
    });
    html+='</div>';
  });
  html+='<div class="total '+(total>=0?'pos':'neg')+'">'+(total>=0?'本局赢 +':'本局输 ')+total+' 金币</div>';
  const isHost=G.room&&G.room.hostUid===G.uid;
  html+='<div style="text-align:center">'+
    (isHost?'<button class="btn" onclick="hide(\'resOverlay\');sendMsg({t:\'again\'})">再来一局</button> '
           :'<span class="hint">等待房主开下一局…</span> ')+
    '<button class="btn gray" onclick="hide(\'resOverlay\')">看牌桌</button></div>';
  document.getElementById('resModal').innerHTML=html;
  show('resOverlay');
}

document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveName();});
